name: ⚡ Update README (Live System)

on:
  schedule:
    - cron: "0 0 * * *"   # se ejecuta cada día
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Generar datos dinámicos
        run: |
          STATUS=$(shuf -n 1 -e "ONLINE" "STEALTH" "ACTIVE")
          DATE=$(date)
          ACTIVITY=$(shuf -n 1 -e "ALTA" "MEDIA" "INTENSA")
          NODE=$(echo $RANDOM)
          COMMITS=$(shuf -i 1-10 -n 1)
          REPOS=$(shuf -i 1-5 -n 1)
          HOURS=$(shuf -i 1-12 -n 1)

          MESSAGES=(
            "El sistema evoluciona..."
            "Nueva capa de conciencia cargada..."
            "Expansión en proceso..."
            "Nodo adaptándose..."
          )
          MESSAGE=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}

          sed -i "s/{{STATUS}}/$STATUS/g" README.md
          sed -i "s/{{LAST_UPDATE}}/$DATE/g" README.md
          sed -i "s/{{ACTIVITY_LEVEL}}/$ACTIVITY/g" README.md
          sed -i "s/{{NODE_ID}}/$NODE/g" README.md
          sed -i "s/{{COMMITS}}/$COMMITS/g" README.md
          sed -i "s/{{REPOS}}/$REPOS/g" README.md
          sed -i "s/{{HOURS}}/$HOURS/g" README.md
          sed -i "s/{{DAILY_MESSAGE}}/$MESSAGE/g" README.md

      - name: Commit y push
        run: |
          git config --global user.name "william-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add README.md
          git commit -m "⚡ auto-update system" || echo "sin cambios"
          git push
