name: ⚡ Live README System PRO FINAL

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

# 🔥 COMPATIBILIDAD FUTURA (Node 24)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      # 🔥 NUEVO (NO ROMPE NADA)
      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar sistema (Python)
        run: python scripts/generate_readme.py

      # 💀 FIX REAL SIN ROMPER NADA
      - name: Commit automático (FIX TOTAL PRO)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "⚡ auto-update system"
          file_pattern: .
          push_options: '--force'
