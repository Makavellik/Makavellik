name: ⚡ Live README System PRO FINAL

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Ejecutar sistema (Python)
        run: python scripts/generate_readme.py

      - name: Commit automático (FIX TOTAL)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "⚡ auto-update system"
          file_pattern: .
          pull: true
