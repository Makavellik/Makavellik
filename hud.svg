
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

<style>
  .bg { fill: #04060a; }
  .grid { stroke: #00ffff; stroke-opacity: 0.12; }
  .text { fill: #00ffff; font-family: monospace; font-size: 12px; }
  .glow { filter: drop-shadow(0 0 6px #00ffff); }
</style>

<rect width="100%" height="100%" class="bg"/>

<circle cx="250" cy="250" r="18" fill="#00ffff" class="glow">
  <animate attributeName="r" values="18;28;18" dur="1s" repeatCount="indefinite"/>
</circle>

<circle cx="250" cy="250" r="70" class="grid"/>
<circle cx="250" cy="250" r="140" class="grid"/>
<circle cx="250" cy="250" r="200" class="grid"/>

<line x1="250" y1="250" x2="250" y2="40" stroke="#00ffff" stroke-width="2" class="glow">
  <animateTransform attributeName="transform"
    type="rotate"
    from="0 250 250"
    to="360 250 250"
    dur="2s"
    repeatCount="indefinite"/>
</line>


    <circle cx="314" cy="147" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="1.4435963965005376s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="347" cy="65" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="1.345293582036032s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="374" cy="329" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="1.4183723686954837s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="381" cy="286" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="1.1390884268029433s" repeatCount="indefinite"/>
    </circle>
    

<rect x="20" y="420" width="114" height="8" fill="#00ffff" class="glow"/>
<rect x="20" y="440" width="282" height="8" fill="#00ffff"/>

<text x="20" y="30" class="text">LATENCY: 75 ms</text>
<text x="20" y="50" class="text">CPU: 38%</text>
<text x="20" y="70" class="text">MEM: 94%</text>
<text x="20" y="90" class="text">SEC: MEDIUM</text>
<text x="20" y="110" class="text">THREAT: STABLE</text>

<text x="250" y="255" text-anchor="middle" class="text glow">
