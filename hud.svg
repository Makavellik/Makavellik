    </circle>
    
    <circle cx="197" cy="118" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="0.8888336726299049s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="219" cy="435" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="0.8351881245673038s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="176" cy="432" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="1.2581290632779025s" repeatCount="indefinite"/>
    </circle>
    

<rect x="20" y="420" width="159" height="8" fill="#00ffff" class="glow"/>
<rect x="20" y="440" width="81" height="8" fill="#00ffff"/>

<text x="20" y="30" class="text">LATENCY: 119 ms</text>
