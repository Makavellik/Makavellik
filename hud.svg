    </circle>
    
    <circle cx="351" cy="253" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="1.466835560212848s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="291" cy="265" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="1.3671703401332498s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="307" cy="197" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="1.1641227052149923s" repeatCount="indefinite"/>
    </circle>
    

<rect x="20" y="420" width="120" height="8" fill="#ffaa00" class="glow"/>
<rect x="20" y="440" width="162" height="8" fill="#ffaa00"/>

<text x="20" y="30" class="text">LATENCY: 33 ms</text>
