
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

<style>
  .bg { fill: #0a0600; }
  .grid { stroke: #ffaa00; stroke-opacity: 0.12; }
  .text { fill: #ffaa00; font-family: monospace; font-size: 12px; }
  .glow { filter: drop-shadow(0 0 6px #ffaa00); }
</style>

<rect width="100%" height="100%" class="bg"/>

<circle cx="250" cy="250" r="18" fill="#ffaa00" class="glow">
  <animate attributeName="r" values="18;28;18" dur="1s" repeatCount="indefinite"/>
</circle>

<circle cx="250" cy="250" r="70" class="grid"/>
<circle cx="250" cy="250" r="140" class="grid"/>
<circle cx="250" cy="250" r="200" class="grid"/>

<line x1="250" y1="250" x2="250" y2="40" stroke="#ffaa00" stroke-width="2" class="glow">
  <animateTransform attributeName="transform"
    type="rotate"
    from="0 250 250"
    to="360 250 250"
    dur="2s"
    repeatCount="indefinite"/>
</line>


    <circle cx="317" cy="353" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="1.2231297929321934s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="166" cy="425" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="1.2333715659746476s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="362" cy="116" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="1.2889366391154737s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="113" cy="387" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="0.981077565104739s" repeatCount="indefinite"/>
    </circle>
    

<rect x="20" y="420" width="192" height="8" fill="#ffaa00" class="glow"/>
<rect x="20" y="440" width="273" height="8" fill="#ffaa00"/>

<text x="20" y="30" class="text">LATENCY: 65 ms</text>
