      <animate attributeName="r" values="3;8;3" dur="1.1642962199343363s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="425" cy="62" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="0.9235492310758187s" repeatCount="indefinite"/>
    </circle>
    

<rect x="20" y="420" width="198" height="8" fill="#ffaa00" class="glow"/>
<rect x="20" y="440" width="96" height="8" fill="#ffaa00"/>

<text x="20" y="30" class="text">LATENCY: 51 ms</text>
