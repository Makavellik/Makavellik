
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

<style>
  .bg { fill: #0a0000; }
  .grid { stroke: #ff0033; stroke-opacity: 0.12; }
  .text { fill: #ff0033; font-family: monospace; font-size: 12px; }
  .glow { filter: drop-shadow(0 0 6px #ff0033); }
</style>

<rect width="100%" height="100%" class="bg"/>

<circle cx="250" cy="250" r="18" fill="#ff0033" class="glow">
  <animate attributeName="r" values="18;28;18" dur="1s" repeatCount="indefinite"/>
</circle>

<circle cx="250" cy="250" r="70" class="grid"/>
<circle cx="250" cy="250" r="140" class="grid"/>
<circle cx="250" cy="250" r="200" class="grid"/>

<line x1="250" y1="250" x2="250" y2="40" stroke="#ff0033" stroke-width="2" class="glow">
  <animateTransform attributeName="transform"
    type="rotate"
    from="0 250 250"
    to="360 250 250"
    dur="2s"
    repeatCount="indefinite"/>
</line>


    <circle cx="192" cy="263" r="3" fill="#ff0033">
      <animate attributeName="r" values="3;8;3" dur="0.8749509737781589s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="315" cy="330" r="3" fill="#ff0033">
      <animate attributeName="r" values="3;8;3" dur="1.0880598402701451s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="105" cy="95" r="3" fill="#ff0033">
      <animate attributeName="r" values="3;8;3" dur="1.3207420789726811s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="322" cy="341" r="3" fill="#ff0033">
      <animate attributeName="r" values="3;8;3" dur="1.0226009747065434s" repeatCount="indefinite"/>
    </circle>
    

<rect x="20" y="420" width="69" height="8" fill="#ff0033" class="glow"/>
<rect x="20" y="440" width="285" height="8" fill="#ff0033"/>

<text x="20" y="30" class="text">LATENCY: 34 ms</text>
<text x="20" y="50" class="text">CPU: 23%</text>
<text x="20" y="70" class="text">MEM: 95%</text>
<text x="20" y="90" class="text">SEC: MEDIUM</text>
<text x="20" y="110" class="text">THREAT: CRITICAL</text>

<text x="250" y="255" text-anchor="middle" class="text glow">
