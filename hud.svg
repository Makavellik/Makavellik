
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

<style>
  .bg { fill: #0a0600; }
  .grid { stroke: #ffaa00; stroke-opacity: 0.12; }
  .text { fill: #ffaa00; font-family: monospace; font-size: 12px; }
  .glow { filter: drop-shadow(0 0 6px #ffaa00); }
</style>

<rect width="100%" height="100%" class="bg"/>

<circle cx="250" cy="250" r="18" fill="#ffaa00" class="glow">
  <animate attributeName="r" values="18;28;18" dur="1s" repeatCount="indefinite"/>
</circle>

<circle cx="250" cy="250" r="70" class="grid"/>
<circle cx="250" cy="250" r="140" class="grid"/>
<circle cx="250" cy="250" r="200" class="grid"/>

<line x1="250" y1="250" x2="250" y2="40" stroke="#ffaa00" stroke-width="2" class="glow">
  <animateTransform attributeName="transform"
    type="rotate"
    from="0 250 250"
    to="360 250 250"
    dur="2s"
    repeatCount="indefinite"/>
</line>


    <circle cx="124" cy="413" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="0.8924906086653568s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="252" cy="275" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="1.37284942084703s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="225" cy="382" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="1.0447455357607713s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="333" cy="112" r="3" fill="#ffaa00">
      <animate attributeName="r" values="3;8;3" dur="0.9111544475338399s" repeatCount="indefinite"/>
    </circle>
    

<rect x="20" y="420" width="237" height="8" fill="#ffaa00" class="glow"/>
<rect x="20" y="440" width="195" height="8" fill="#ffaa00"/>

<text x="20" y="30" class="text">LATENCY: 115 ms</text>
<text x="20" y="50" class="text">CPU: 79%</text>
<text x="20" y="70" class="text">MEM: 65%</text>
<text x="20" y="90" class="text">SEC: LOW</text>
<text x="20" y="110" class="text">THREAT: ELEVATED</text>

