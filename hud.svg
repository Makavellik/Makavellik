
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

<style>
  .bg { fill: #04060a; }
  .grid { stroke: #00ffff; stroke-opacity: 0.12; }
  .text { fill: #00ffff; font-family: monospace; font-size: 12px; }
  .glow { filter: drop-shadow(0 0 6px #00ffff); }
</style>

<rect width="100%" height="100%" class="bg"/>

<circle cx="250" cy="250" r="18" fill="#00ffff" class="glow">
  <animate attributeName="r" values="18;28;18" dur="1s" repeatCount="indefinite"/>
</circle>

<circle cx="250" cy="250" r="70" class="grid"/>
<circle cx="250" cy="250" r="140" class="grid"/>
<circle cx="250" cy="250" r="200" class="grid"/>

<line x1="250" y1="250" x2="250" y2="40" stroke="#00ffff" stroke-width="2" class="glow">
  <animateTransform attributeName="transform"
    type="rotate"
    from="0 250 250"
    to="360 250 250"
    dur="2s"
    repeatCount="indefinite"/>
</line>


    <circle cx="256" cy="200" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="1.3516588593326775s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="71" cy="200" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="0.9710514550175748s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="207" cy="267" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="1.105317963849642s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="292" cy="150" r="3" fill="#00ffff">
      <animate attributeName="r" values="3;8;3" dur="0.9224361703624355s" repeatCount="indefinite"/>
    </circle>
    

<rect x="20" y="420" width="258" height="8" fill="#00ffff" class="glow"/>
<rect x="20" y="440" width="105" height="8" fill="#00ffff"/>

<text x="20" y="30" class="text">LATENCY: 78 ms</text>
<text x="20" y="50" class="text">CPU: 86%</text>
<text x="20" y="70" class="text">MEM: 35%</text>
<text x="20" y="90" class="text">SEC: HIGH</text>
<text x="20" y="110" class="text">THREAT: STABLE</text>

<text x="250" y="255" text-anchor="middle" class="text glow">
  ✓ SYSTEM STABLE
</text>

