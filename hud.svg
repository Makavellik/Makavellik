
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

<style>
  .bg { fill: #0a0000; }
  .grid { stroke: #ff0033; stroke-opacity: 0.12; }
  .text { fill: #ff0033; font-family: monospace; font-size: 12px; }
  .glow { filter: drop-shadow(0 0 6px #ff0033); }
</style>

<rect width="100%" height="100%" class="bg"/>

<circle cx="250" cy="250" r="18" fill="#ff0033" class="glow">
  <animate attributeName="r" values="18;28;18" dur="1s" repeatCount="indefinite"/>
</circle>

<circle cx="250" cy="250" r="70" class="grid"/>
<circle cx="250" cy="250" r="140" class="grid"/>
<circle cx="250" cy="250" r="200" class="grid"/>

<line x1="250" y1="250" x2="250" y2="40" stroke="#ff0033" stroke-width="2" class="glow">
  <animateTransform attributeName="transform"
    type="rotate"
    from="0 250 250"
    to="360 250 250"
    dur="2s"
    repeatCount="indefinite"/>
</line>


    <circle cx="212" cy="305" r="3" fill="#ff0033">
      <animate attributeName="r" values="3;8;3" dur="1.1534142181141314s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="388" cy="132" r="3" fill="#ff0033">
      <animate attributeName="r" values="3;8;3" dur="1.1104823396084151s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="277" cy="187" r="3" fill="#ff0033">
      <animate attributeName="r" values="3;8;3" dur="1.4247790602797692s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="77" cy="326" r="3" fill="#ff0033">
      <animate attributeName="r" values="3;8;3" dur="1.3510082930231024s" repeatCount="indefinite"/>
    </circle>
    

<rect x="20" y="420" width="90" height="8" fill="#ff0033" class="glow"/>
<rect x="20" y="440" width="201" height="8" fill="#ff0033"/>

<text x="20" y="30" class="text">LATENCY: 24 ms</text>
<text x="20" y="50" class="text">CPU: 30%</text>
<text x="20" y="70" class="text">MEM: 67%</text>
<text x="20" y="90" class="text">SEC: LOW</text>
<text x="20" y="110" class="text">THREAT: CRITICAL</text>

<text x="250" y="255" text-anchor="middle" class="text glow">
  ⚠ SYSTEM UNDER THREAT
</text>

<text x="250" y="280" text-anchor="middle" class="text">
  ANALYZING...
</text>

</svg>
